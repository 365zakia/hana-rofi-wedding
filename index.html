<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: url('latar1.png') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: serif;
}

/* Overlay supaya teks lebih terlihat */
.overlay {
  text-align: center;
  color: white;
  animation: fadeIn 3s ease forwards;
  opacity: 0;
}

/* Nama */
.names {
  font-size: 50px;
  font-weight: bold;
}

/* Animasi fade */
@keyframes fadeIn {
  to {
    opacity: 1;
  }
}
</style>
</head>

<body>

<div class="overlay">
  <h3>The Wedding Of</h3>
  <div class="names">Hana & Rofi</div>
</div>

</body>
</html>
