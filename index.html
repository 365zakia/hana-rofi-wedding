<!DOCTYPE html>
<html>
<head>
    <title>Undangan Pernikahan Zakia</title>
    <style>
        body {
            background-color: #fce4ec;
            text-align: center;
            font-family: Arial, sans-serif;
            padding: 50px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
            display: inline-block;
        }

        h1 {
            color: #c2185b;
        }

        p {
            font-size: 18px;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #c2185b;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background: #880e4f;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Undangan Pernikahan</h1>
        <h2>Zakia & Pasangan</h2>
        <p>Sabtu, 10 Mei 2026</p>
        <p>Pukul 10.00 WIB</p>
        <p>Semarang</p>

        <button class="btn" onclick="alert('Terima kasih sudah membuka undangan 💖')">
            Buka Undangan
        </button>
    </div>

</body>
</html>
